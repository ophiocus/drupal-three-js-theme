# Demo corpus for the World Signature first-run wizard.
#
# Five topic terms + 12 articles + 6 profiles + 4 events. Texts are
# topic-distinctive so the TF-IDF embedder produces visible clusters
# in the inner-mind atmosphere. Profiles bridge two topics so the
# constellation isn't perfectly partitioned — readable mental model:
# clusters that touch, not isolated islands.
#
# Imported by Drupal\world_signature\Service\DemoContentInstaller.
# After import the installer triggers an embed pass so signatures
# carry vectors from the first front-page render.

topics:
  - slug: art
    name: Art
  - slug: science
    name: Science
  - slug: philosophy
    name: Philosophy
  - slug: technology
    name: Technology
  - slug: society
