# Turntable preview clip for an asset — a short, muted, looping
# video (webm/mp4) of the model rotating, autoplayed on hover in
# asset listings. The clip is PRODUCED EXTERNALLY (the platform's
# headless render/transform service), not by this module; the module
# only hosts the field, renders it in the teaser, and plays it on
# hover. Video, not GIF: "autoplay on hover" requires play/pause
# gating, which only video supports.
langcode: en
status: true
