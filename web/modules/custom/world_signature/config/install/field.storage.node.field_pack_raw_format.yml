# The downloaded pack's container format. Drives expectations
# about whether the curator needs to extract individual meshes
# (zip / blend with multiple objects) or whether the pack is
# already a single mesh ready for use (glb / gltf).
langcode: en
status: true
dependencies:
  module:
    - node
    - options
id: node.field_pack_raw_format
field_name: field_pack_raw_format
entity_type: node
type: list_string
settings:
  allowed_values:
    - value: glb
      label: 'glTF binary (.glb)'
    - value: gltf
      label: 'glTF JSON (.gltf)'
    - value: fbx
      label: 'Autodesk FBX (.fbx)'
    - value: obj
      label: 'Wavefront OBJ (.obj)'
    - value: blend
      label: 'Blender (.blend)'
    - value: zip
      label: 'Archive (.zip)'
  allowed_values_function: ''
module: options
locked: false
cardinality: 1
translatable: false
indexes: {  }
persist_with_no_fields: false
custom_storage: false
