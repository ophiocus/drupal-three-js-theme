# world_signature.palette
#
# The renderer reads this from the snapshot and applies it to every
# material, light, and fog setting on boot. Each property overrides
# this file via config_sync (see DATAFLOW §3b — config_ignore is
# explicitly NOT recommended for the palette; treat it as code-deployed).
#
# Default: pastel greens + light blue. Calm, neutral, property-agnostic.
# atlas_coffee's prod deploy overrides to warm earth per docs/SUBJECT.md.
#
# Color values are CSS hex strings; three.js parses them via THREE.Color.

# Active atmosphere — whole-world visual idiom.
#
#   'none'  → default SmartObject builders: UE5-style blockout
#             (transparent color slots, UV-test textures, meta
#             geometry). A deliberate "configure me" state, not
#             a half-finished one.
#   other   → lazy-loads the matching atmosphere module in
#             src/world/runtime/atmospheres/<name>/ and merges
#             its palette from atmosphere_overrides below.
#
# The reference project ships 'forest' — condensed here from what
# was a floating `drush config:set` adaptation. A property using
# this theme overrides the value via config_sync.
# See docs/ATMOSPHERES.md.
active_atmosphere: 'forest'

background: '#d0dce6'
fog:
  color: '#c8d8e0'
  near: 80
  far: 500
ambient:
  color: '#e8efe9'
  intensity: 0.85
sun:
  color: '#fffae0'
  intensity: 1.3
  position:
    - 80
    - 120
    - 60
fill:
  color: '#a8c4dc'
  intensity: 0.45
  position:
    - -80
    - 60
    - -60
ground:
  color: '#c4dec4'
sectorPad:
  color: '#a4c498'
compassPost:
  color: '#a8b4c0'
bundleColors:
  article: '#8eb887'
  profile: '#92aabe'
  event: '#d8d098'
  default: '#a8b4b8'
# Per-sector biome overlays. Each entry binds to one sector in
# termId-ascending order. atlas_coffee's five regions get a tonal
# palette evoking the place — volcanic Central American warmth,
# Andean clarity, cloud-forest cool, Chiapas dust, Costa Rican
# saturation. Properties override this entire sequence per their
# editorial subject.
biomes:
  - label: 'Volcanic Central America (Antigua-like)'
    background: '#cad6c2'
    fog:
      color: '#c8d2c2'
      near: 80
      far: 480
    ambient:
      color: '#f0e8c8'
      intensity: 0.95
  - label: 'High Andes (Cauca-like)'
    background: '#d8dfe6'
    fog:
      color: '#cdd6e0'
      near: 100
      far: 520
    ambient:
      color: '#e8eef4'
      intensity: 0.85
  - label: 'Cloud forest (Boquete-like)'
    background: '#c4cfd6'
    fog:
      color: '#b8c4cc'
      near: 60
      far: 420
    ambient:
      color: '#d8e0e6'
      intensity: 0.70
  - label: 'Mountain dust (Sierra Madre-like)'
    background: '#d4ccba'
    fog:
      color: '#ccc2b0'
      near: 80
      far: 480
    ambient:
      color: '#f4e8c8'
      intensity: 0.90
  - label: 'Saturated green (Tarrazú-like)'
    background: '#c6d6c4'
    fog:
      color: '#bccdba'
      near: 90
      far: 500
    ambient:
      color: '#e0e8d8'
      intensity: 0.88

# Per-atmosphere palette overlays (option-f, per docs/v0.2/ROADMAP.md
# §P1). When active_atmosphere matches a key here, SnapshotPublisher
# merges that overlay onto the base palette before the biome blend
# runs on top. Partial — an atmosphere only declares the fields it
# wants to change.
#
# DISCIPLINE: these values are the machine-readable consequence of
# the atmosphere's CHARTER. When you change a value here, update the
# matching CHARTER's "Palette overrides" table in the same commit.
# The CHARTER is intent; this is deployment; they must agree.
atmosphere_overrides:
  forest:
    # Deep forest dusk — see docs/atmospheres/forest/CHARTER.md.
    background: '#1d2a1f'
    fog:
      color: '#2a3a30'
      near: 40
      far: 380
    ambient:
      color: '#c8d2a0'
      intensity: 0.55
    sun:
      color: '#ffe2a0'
      intensity: 1.3
      position:
        - 120
        - 80
        - 40
    ground:
      color: '#3a4a2a'
    # Lighter olive than ground so the radial-gradient pad reads
    # as a brighter clearing rather than a stark contrast.
    sectorPad:
      color: '#5a6a3a'
    bundleColors:
      article: '#5a7a3a'
      profile: '#7a5a3a'
      event: '#8a6a40'
      default: '#4a3828'
