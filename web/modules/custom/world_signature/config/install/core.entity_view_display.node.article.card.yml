# Card view-display for article.
#
# Mirrors the Standard article default — body + image + tags —
# MINUS comment + links. The FullView modal pulls this for trees
# at detail vantage; comments are out of scope at that layer.
#
# `card` view-mode itself is defined by core.entity_view_mode.node.card.yml.
langcode: en
status: true
dependencies:
  config:
    - core.entity_view_mode.node.card
    - field.field.node.article.body
    - field.field.node.article.field_image
    - field.field.node.article.field_tags
    - field.field.node.article.field_world_sector
    - field.field.node.article.field_world_signature
    - image.style.wide
    - node.type.article
  module:
    - image
    - text
id: node.article.card
targetEntityType: node
bundle: article
mode: card
content:
  field_image:
    type: image
    label: hidden
    settings:
      image_link: ''
      image_style: wide
      image_loading:
        attribute: eager
    third_party_settings: {  }
    weight: -1
    region: content
  body:
    type: text_default
    label: hidden
    settings: {  }
    third_party_settings: {  }
    weight: 0
    region: content
  field_tags:
    type: entity_reference_label
    label: above
    settings:
      link: true
    third_party_settings: {  }
    weight: 10
    region: content
hidden:
  comment: true
  field_world_sector: true
  field_world_signature: true
  langcode: true
  links: true
  search_api_excerpt: true
