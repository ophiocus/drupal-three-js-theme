# pack instance on the asset bundle. Required — every asset has a
# parent pack node (the acquisition unit). Standalone single-mesh
# sources get a one-asset pack rather than a null reference.
langcode: en
status: true
dependencies:
  config:
    - field.storage.node.field_asset_pack
    - node.type.asset
    - node.type.pack
id: node.asset.field_asset_pack
field_name: field_asset_pack
entity_type: node
bundle: asset
label: 'Parent pack'
description: 'The pack this asset belongs to. Provenance (source URL, license, attribution) lives on the pack.'
required: true
translatable: false
default_value: {  }
default_value_callback: ''
settings:
  handler: 'default:node'
  handler_settings:
    target_bundles:
      pack: pack
    sort:
      field: _none
      direction: ASC
    auto_create: false
    auto_create_bundle: ''
field_type: entity_reference
