# Raw asset file: the mesh binary as extracted from its source pack,
# UNtransformed. Asset ingestion (docs/feature-requests/asset-ingestion.md)
# fills this from a leeched + decompressed download; curation — the
# human task — produces field_asset_curated_file from it. Keeping raw
# and curated as separate fields preserves provenance: the original
# is never overwritten by the world-ready normalization.
langcode: en
status: true
dependencies:
  module:
    - file
    - node
id: node.field_asset_raw_file
field_name: field_asset_raw_file
entity_type: node
type: file
settings:
  display_field: false
  display_default: false
  uri_scheme: public
  target_type: file
module: file
locked: false
cardinality: 1
translatable: false
indexes:
  target_id:
    - target_id
persist_with_no_fields: false
custom_storage: false
