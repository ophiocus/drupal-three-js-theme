# Default view-display for the event bundle. Same pattern as the
# profile display — Standard install doesn't ship one, so without
# this the card endpoint renders an empty wrapper and the FullView
# modal shows no content.
langcode: en
status: true
dependencies:
  config:
    - field.field.node.event.body
    - field.field.node.event.field_world_sector
    - field.field.node.event.field_world_signature
    - node.type.event
  module:
    - text
    - user
id: node.event.default
targetEntityType: node
bundle: event
mode: default
content:
  body:
    type: text_default
    label: hidden
    settings: {  }
    third_party_settings: {  }
    weight: 0
    region: content
  links:
    settings: {  }
    third_party_settings: {  }
    weight: 100
    region: content
hidden:
  field_world_sector: true
  field_world_signature: true
  langcode: true
  search_api_excerpt: true
