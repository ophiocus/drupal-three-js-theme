# Asset licenses vocabulary.
#
# Each term is a license tier under which a sourced .glb can live.
# field_asset_license on the asset bundle references a single term
# here. The runtime attribution surface reads which assets carry
# CC-BY (attribution required) vs CC0 (no attribution needed) and
# composes the credits accordingly.
#
# Canonical terms (CC0, CC-BY, CC-BY-SA, CC-BY-NC, Sketchfab
# Standard, itch.io paid, Custom in-house) are seeded by
# scaffold/seed-asset-vocab.php — the module ships the vocab; the
# seeder ships the terms. Same split as Regions.
