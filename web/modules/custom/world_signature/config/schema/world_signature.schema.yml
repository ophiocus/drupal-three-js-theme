# ─── Manifesto — the world's master registry ──────────────────────
# See docs/MANIFESTO.md for the canonical thinking. This config is
# module-shipped (config/install/) and rarely edited per-property;
# it is the source of truth for what's configurable, not where
# property values live.

world_signature.manifesto:
  type: config_object
  label: 'World manifesto'
  mapping:
    version:
      type: integer
      label: 'Manifesto schema version'
    component_types:
      type: sequence
      label: 'Vocabulary of properties items can carry'
      sequence:
        type: mapping
        mapping:
          label:
            type: label
          description:
            type: text
          value_schema:
            type: ignore
            label: 'Descriptive shape of values for this component (free-form for now; future versions may formalise)'
          examples:
            type: sequence
            sequence:
              type: string
    item_types:
      type: sequence
      label: 'Kinds of things the world contains'
      sequence:
        type: mapping
        mapping:
          id:
            type: string
            label: 'Item type identifier (dotted; e.g. world.global, metaphor.node.article)'
          label:
            type: label
          description:
            type: text
          instance_cardinality:
            type: string
            label: 'singleton | singleton-per-bundle | per-bundle | per-taxonomy-term | per-instance'
          config_object:
            type: string
            label: 'Drupal config path where instances of this item type land (may include {placeholder} segments)'
          components:
            type: sequence
            label: 'Component slots this item type exposes'
            sequence:
              type: mapping
              mapping:
                type:
                  type: string
                  label: 'Component type (must match a key in component_types)'
                name:
                  type: string
                  label: 'Slot name within this item type'
          status:
            type: string
            label: 'implemented | partially_implemented | planned'

# ─── Per-instance config schemas ──────────────────────────────────
# Each item type's config_object lands here. Properties override
# these via standard Drupal config_sync.

world_signature.palette:
  type: config_object
  label: 'World palette'
  mapping:
    active_atmosphere:
      type: string
      label: 'Active atmosphere — visual idiom of the world (forest, outer_space, inner_mind, or "none"). See docs/ATMOSPHERES.md.'
    background:
      type: string
      label: 'Sky / scene background colour (CSS hex)'
    fog:
      type: mapping
      label: 'Fog'
      mapping:
        color:
          type: string
          label: 'Fog colour'
        near:
          type: float
          label: 'Fog near distance'
        far:
          type: float
          label: 'Fog far distance'
    ambient:
      type: mapping
      label: 'Ambient light'
      mapping:
        color:
          type: string
          label: 'Ambient colour'
        intensity:
          type: float
          label: 'Ambient intensity'
    sun:
      type: mapping
      label: 'Key directional light'
      mapping:
        color:
          type: string
          label: 'Sun colour'
        intensity:
          type: float
          label: 'Sun intensity'
        position:
          type: sequence
          label: 'Sun position [x,y,z]'
          sequence:
            type: float
    fill:
      type: mapping
      label: 'Fill directional light'
      mapping:
        color:
          type: string
          label: 'Fill colour'
        intensity:
          type: float
          label: 'Fill intensity'
        position:
          type: sequence
          label: 'Fill position [x,y,z]'
          sequence:
            type: float
    ground:
      type: mapping
      label: 'Ground plane material'
      mapping:
        color:
          type: string
          label: 'Ground colour'
    sectorPad:
      type: mapping
      label: 'Sector centroid pad material'
      mapping:
        color:
          type: string
          label: 'Sector pad colour'
    compassPost:
      type: mapping
      label: 'Compass post material (ALPHA placeholder)'
      mapping:
        color:
          type: string
          label: 'Compass post colour'
    bundleColors:
      type: mapping
      label: 'Per-bundle entity material colours'
      mapping:
        article:
          type: string
          label: 'Article bundle colour'
        profile:
          type: string
          label: 'Profile bundle colour'
        event:
          type: string
          label: 'Event bundle colour'
        default:
          type: string
          label: 'Fallback colour for any bundle without a specific entry'
    biomes:
      type: sequence
      label: 'Per-sector biome overlays. The renderer assigns one biome to each sector in termId-ascending order, blending them by inverse-square distance from camera XZ. Add more entries than sectors and the extras are ignored; fewer and the sectors past the end fall back to the global palette.'
      sequence:
        type: mapping
        mapping:
          label:
            type: label
            label: 'Human-readable biome name (editorial; not used by the renderer)'
          background:
            type: string
            label: 'Biome background tint (CSS hex)'
          fog:
            type: mapping
            label: 'Biome fog'
            mapping:
              color:
                type: string
                label: 'Fog colour'
              near:
                type: float
                label: 'Fog near distance'
              far:
                type: float
                label: 'Fog far distance'
          ambient:
            type: mapping
            label: 'Biome ambient light'
            mapping:
              color:
                type: string
                label: 'Ambient colour'
              intensity:
                type: float
                label: 'Ambient intensity'
    atmosphere_overrides:
      type: sequence
      label: 'Per-atmosphere palette overlays, keyed by atmosphere name. When active_atmosphere matches a key here, SnapshotPublisher merges that overlay onto the base palette. Partial — only the fields an atmosphere wants to change. See docs/ATMOSPHERES.md.'
      sequence:
        type: mapping
        label: 'Palette overlay for one atmosphere'
        mapping:
          background:
            type: string
            label: 'Background colour override'
          fog:
            type: mapping
            label: 'Fog override'
            mapping:
              color:
                type: string
              near:
                type: float
              far:
                type: float
          ambient:
            type: mapping
            label: 'Ambient light override'
            mapping:
              color:
                type: string
              intensity:
                type: float
          sun:
            type: mapping
            label: 'Key light override'
            mapping:
              color:
                type: string
              intensity:
                type: float
              position:
                type: sequence
                sequence:
                  type: float
          fill:
            type: mapping
            label: 'Fill light override'
            mapping:
              color:
                type: string
              intensity:
                type: float
              position:
                type: sequence
                sequence:
                  type: float
          ground:
            type: mapping
            label: 'Ground material override'
            mapping:
              color:
                type: string
          sectorPad:
            type: mapping
            label: 'Sector pad material override'
            mapping:
              color:
                type: string
          compassPost:
            type: mapping
            label: 'Compass post material override'
            mapping:
              color:
                type: string
          bundleColors:
            type: mapping
            label: 'Per-bundle colour overrides'
            mapping:
              article:
                type: string
              profile:
                type: string
              event:
                type: string
              default:
                type: string

# ─── Commerce metaphors (R2 — virtuabooth pivot) ──────────────────
# Two wildcard config_object families authored by world_signature so
# the schema is in place wherever the metaphors are enabled (the
# virtuabooth module ships the concrete plugins + per-instance
# config). Both shapes mirror their item_type's components in the
# manifesto.

world_signature.commerce.product.*:
  type: config_object
  label: 'Commerce product stall instance'
  mapping:
    label:
      type: label
      label: 'Human-readable label for this instance'
    product_id:
      type: string
      label: 'Commerce product id this instance binds to (string for portability across SKU schemes)'
    accent:
      type: string
      label: 'Brand accent colour (CSS hex)'
    stall_ground:
      type: string
      label: 'Stall ground colour (CSS hex)'
    stall_floor:
      type: mapping
      label: 'Stall floor texture'
      mapping:
        path:
          type: string
        repeat:
          type: sequence
          sequence:
            type: float
        wrap:
          type: string
    vantage_arrive:
      type: mapping
      label: 'Camera-arrival flourish animation'
      mapping:
        clip:
          type: string
        duration_ms:
          type: integer
        easing:
          type: string
        loop:
          type: boolean
    configurator_open:
      type: mapping
      label: 'Configurator-open animation'
      mapping:
        clip:
          type: string
        duration_ms:
          type: integer
        easing:
          type: string
        loop:
          type: boolean
    ambient:
      type: mapping
      label: 'Ambient stall sound'
      mapping:
        source:
          type: string
        volume:
          type: float
        loop:
          type: boolean
        spatial:
          type: boolean
    spec_sheet:
      type: mapping
      label: 'HTML spec-sheet surface'
      mapping:
        content_ref:
          type: string
        width_px:
          type: integer
        height_px:
          type: integer
        transparent_background:
          type: boolean
        refresh:
          type: string
    configurable_items:
      type: sequence
      label: 'Ordered list of configurable_item instance ids attachable to this product'
      sequence:
        type: string

world_signature.commerce.configurable_item.*:
  type: config_object
  label: 'Commerce configurable item instance'
  mapping:
    label:
      type: label
      label: 'Human-readable label for this part'
    parent_product:
      type: string
      label: 'world_signature.commerce.product.* instance id this part attaches to'
    anchor:
      type: string
      label: 'Named anchor on the parent product where this part snaps'
    asset:
      type: mapping
      label: 'Source asset reference (resolved via threed_assets)'
      mapping:
        media_uuid:
          type: string
          label: 'Media entity UUID for the GLB (preferred — threed_assets owns the media)'
        path:
          type: string
          label: 'Fallback URL path if media_uuid is unavailable'
    tint:
      type: string
      label: 'Part tint colour (CSS hex)'
    diffuse:
      type: mapping
      label: 'Diffuse texture override'
      mapping:
        path:
          type: string
        repeat:
          type: sequence
          sequence:
            type: float
        wrap:
          type: string
    idle:
      type: mapping
      label: 'Idle animation clip'
      mapping:
        clip:
          type: string
        duration_ms:
          type: integer
        easing:
          type: string
        loop:
          type: boolean
    equip:
      type: mapping
      label: 'Equip animation clip'
      mapping:
        clip:
          type: string
        duration_ms:
          type: integer
        easing:
          type: string
        loop:
          type: boolean
    dequip:
      type: mapping
      label: 'Dequip animation clip'
      mapping:
        clip:
          type: string
        duration_ms:
          type: integer
        easing:
          type: string
        loop:
          type: boolean
    triggers:
      type: mapping
      label: 'Trigger event bindings'
      mapping:
        equip:
          type: string
          label: 'Event source (e.g. user_click on the part)'
        dequip:
          type: string
          label: 'Event source (e.g. user_click on parent stall)'
