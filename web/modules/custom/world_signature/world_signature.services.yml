services:
  # Logger channel — inject as `@logger.channel.world_signature`.
  logger.channel.world_signature:
    parent: logger.channel_base
    arguments: ['world_signature']

  # Metaphor plugin manager — discovers per-bundle metaphor plugins.
  plugin.manager.world_signature.metaphor:
    class: Drupal\world_signature\Plugin\MetaphorPluginManager
    parent: default_plugin_manager

  # Pure-PHP signature extractor. Stateless. No deps.
  world_signature.signature_extractor:
    class: Drupal\world_signature\Signature\SignatureExtractor

  # Drupal-coupled facts reader. Bridges EntityInterface ->
  # EntityFacts via the matching Metaphor plugin.
  world_signature.entity_facts_reader:
    class: Drupal\world_signature\Service\EntityFactsReader
    arguments:
      - '@plugin.manager.world_signature.metaphor'
      - '@logger.channel.world_signature'

  # Writes the JSON-encoded Signature onto the entity's
  # field_world_signature field.
  world_signature.signature_writer:
    class: Drupal\world_signature\Service\SignatureWriter
    arguments:
      - '@logger.channel.world_signature'

  # Builds the skinny descriptor written to the gateway.
  world_signature.descriptor_builder:
    class: Drupal\world_signature\Service\DescriptorBuilder

  # Guzzle client to the RESTHeart gateway. The service reads
  # env vars (WORLD_GATEWAY_URL, WORLD_SIGNATURE_DATABASE,
  # WORLD_GATEWAY_USER, WORLD_GATEWAY_PASSWORD) directly via
  # getenv() — Drupal's container doesn't expand %env()% the
  # way Symfony's does. Sandbox values come from
  # .ddev/config.yaml's web_environment.
  world_signature.world_search_client:
    class: Drupal\world_signature\Service\WorldSearchClient
    arguments:
      - '@http_client'
      - '@logger.channel.world_signature'

  # Snapshot publisher — assembles a corpus snapshot the renderer
  # consumes. Pulls all descriptors from the gateway, lays out
  # sectors on a deterministic circle, merges in world.palette
  # config so the renderer can theme materials/lights/fog.
  world_signature.snapshot_publisher:
    class: Drupal\world_signature\Service\SnapshotPublisher
    arguments:
      - '@world_signature.world_search_client'
      - '@config.factory'
      - '@entity_type.manager'
      - '@world_signature.asset_snapshot_builder'
      - '@state'

  # World manifesto — read-only API over the registry of item
  # types and component types. See docs/MANIFESTO.md.
  world_signature.manifesto:
    class: Drupal\world_signature\Service\WorldManifesto
    arguments:
      - '@config.factory'

  # Asset snapshot builder — projects asset+pack content into the
  # renderer's payload shape. Single read path for both the embedded
  # /world/snapshot/full assets[] block and the sidecar
  # /world/snapshot/assets diagnostic route. See ROADMAP.md §A.2
  # and Service/AssetSnapshotBuilder.php.
  world_signature.asset_snapshot_builder:
    class: Drupal\world_signature\Service\AssetSnapshotBuilder
    arguments:
      - '@entity_type.manager'
      - '@file_url_generator'
      - '@logger.channel.world_signature'

  # ─── BETA 2: embedding-driven semantic layout ──────────────────
  # Local TF-IDF provider — dependency-free, deterministic, no keys.
  # The dev/demo embedder; produces lexical-proximity vectors.
  world_signature.embedding.local:
    class: Drupal\world_signature\Embedding\LocalTfIdfEmbeddingProvider

  # Remote neural provider — production upgrade path. Reads
  # WORLD_EMBED_* env vars; unconfigured by default (falls back
  # to local via the manager).
  world_signature.embedding.remote:
    class: Drupal\world_signature\Embedding\RemoteEmbeddingProvider
    arguments:
      - '@http_client'
      - '@logger.channel.world_signature'

  # Embedding manager — selects remote-if-configured else local,
  # exposes embedCorpus().
  world_signature.embedding.manager:
    class: Drupal\world_signature\Embedding\EmbeddingManager
    arguments:
      - '@world_signature.embedding.local'
      - '@world_signature.embedding.remote'
      - '@logger.channel.world_signature'

  # Semantic layout projector — embeddings → deterministic 2D world
  # coordinates via classical MDS. Pure math, no deps.
  world_signature.embedding.projector:
    class: Drupal\world_signature\Embedding\SemanticLayoutProjector

  # ─── Phase 3 v2: in-canvas world-config writer ────────────────
  # WorldConfigEditor — validates and writes the Stage panel's
  # "World defaults" patches (today: active_atmosphere) to the
  # world_signature.palette config. Snapshot cache busts via the
  # existing `config:world_signature.palette` tag (no manual
  # invalidation needed). See docs/TOOLBOX_AND_STAGE.md §2.3.
  world_signature.world_config_editor:
    class: Drupal\world_signature\Service\WorldConfigEditor
    arguments:
      - '@config.factory'
      - '@logger.channel.world_signature'

  # ─── Phase 3 v3: in-canvas interpretation-rules writer ─────────
  # WorldInterpretationEditor — anchor pole edits for a target
  # atmosphere's interpretation profile (today: inner-mind's 3 axes).
  # Separate from WorldConfigEditor because the patch shape is
  # structured (axes array), not flat. Snapshot cache busts via the
  # existing `config:world_signature.interpretation` tag.
  # See docs/INTERPRETATION_ENGINE.md §3 / docs/TOOLBOX_AND_STAGE.md §4.
  world_signature.world_interpretation_editor:
    class: Drupal\world_signature\Service\WorldInterpretationEditor
    arguments:
      - '@config.factory'
      - '@logger.channel.world_signature'

  # ─── Phase 3 v1: admin re-embed trigger ────────────────────────
  # EmbedRunner — single source of truth for "embed the whole corpus
  # and write the vectors back." Called by both `drush world:embed`
  # and POST /world/admin/embed, so CLI vs. in-canvas UI can never
  # drift in semantics. See docs/TOOLBOX_AND_STAGE.md §4 Phase 3 v1.
  world_signature.embed_runner:
    class: Drupal\world_signature\Service\EmbedRunner
    arguments:
      - '@entity_type.manager'
      - '@world_signature.entity_facts_reader'
      - '@world_signature.signature_extractor'
      - '@world_signature.signature_writer'
      - '@world_signature.descriptor_builder'
      - '@world_signature.world_search_client'
      - '@plugin.manager.world_signature.metaphor'
      - '@world_signature.embedding.manager'
      - '@state'
      - '@logger.channel.world_signature'
      - '@config.factory'

  # ─── Asset ingestion: thin source-provider layer ───────────────
  # Each adapter resolves a source reference (URL or scheme:id) into
  # leechable SourceAssets carrying download URL + copyright metadata.
  # Tagged + priority-ordered; the manager picks the first that
  # supports() a reference. DirectUrlAdapter is the lowest-priority
  # catch-all. See docs/feature-requests/asset-ingestion*.md.
  world_signature.source_adapter.polyhaven:
    class: Drupal\world_signature\Ingest\Adapter\PolyHavenAdapter
    arguments: ['@http_client', '@logger.channel.world_signature']
    tags:
      - { name: world_signature.source_adapter, priority: 60 }

  world_signature.source_adapter.ambientcg:
    class: Drupal\world_signature\Ingest\Adapter\AmbientCgAdapter
    arguments: ['@http_client', '@logger.channel.world_signature']
    tags:
      - { name: world_signature.source_adapter, priority: 55 }

  world_signature.source_adapter.toxsam:
    class: Drupal\world_signature\Ingest\Adapter\ToxSamRegistryAdapter
    arguments: ['@http_client', '@logger.channel.world_signature']
    tags:
      - { name: world_signature.source_adapter, priority: 50 }

  world_signature.source_adapter.polypizza:
    class: Drupal\world_signature\Ingest\Adapter\PolyPizzaAdapter
    arguments: ['@http_client', '@logger.channel.world_signature']
    tags:
      - { name: world_signature.source_adapter, priority: 45 }

  # Catch-all — any direct http(s) URL. Lowest priority so catalog
  # adapters claim their own domains/schemes first.
  world_signature.source_adapter.direct:
    class: Drupal\world_signature\Ingest\Adapter\DirectUrlAdapter
    tags:
      - { name: world_signature.source_adapter, priority: -100 }

  # Manager — collects the tagged adapters (priority-ordered) and
  # routes a reference to the first that handles it.
  world_signature.source_adapter_manager:
    class: Drupal\world_signature\Ingest\SourceAdapterManager
    arguments:
      - !tagged_iterator world_signature.source_adapter
