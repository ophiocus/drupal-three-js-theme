# The renderer's contract with Drupal lives here.
#
# JSON / data endpoints (the cypher's read API):
#   /world/health                                  → status JSON
#   /world/snapshot/full                           → full corpus snapshot JSON
#   /world/descriptor/{id}                         → one descriptor JSON
#   /world/card/{entity_type}/{id}/{view_mode}     → Drupal-rendered HTML for FullView
#
# Vantage routes (v0.1.1 — deep-linkable world coordinates):
#   /sector/{termId}                               → world shell at sector vantage
#
# Note: /node/{id} is already a Drupal canonical route and serves
# the world shell via the theme's page.html.twig override. We do
# NOT override it here — letting Drupal's node route stand keeps
# editing UI, contextual links, and access control intact.
#
# Anonymous access for ALPHA. v0.0.2 may add per-property auth.

world_signature.health:
  path: '/world/health'
  defaults:
    _controller: '\Drupal\world_signature\Controller\WorldController::health'
    _format: json
  requirements:
    _access: 'TRUE'
  options:
    no_cache: 'TRUE'

world_signature.snapshot:
  path: '/world/snapshot/full'
  defaults:
    _controller: '\Drupal\world_signature\Controller\WorldController::snapshot'
    _format: json
  requirements:
    _access: 'TRUE'

# Sidecar to /world/snapshot/full — returns ONLY the assets[] block.
# Same data, different surface. Used as a diagnostic curl probe
# (verify which asset is live per slot per atmosphere) and by the
# A.5 /admin/world/assets view (when shipped).
world_signature.snapshot_assets:
  path: '/world/snapshot/assets'
  defaults:
    _controller: '\Drupal\world_signature\Controller\WorldController::assetsSnapshot'
    _format: json
  requirements:
    _access: 'TRUE'

world_signature.descriptor:
  path: '/world/descriptor/{id}'
  defaults:
    _controller: '\Drupal\world_signature\Controller\WorldController::descriptor'
    _format: json
  requirements:
    _access: 'TRUE'
    id: '[a-z0-9_-]+'

world_signature.card:
  path: '/world/card/{entity_type}/{id}/{view_mode}'
  defaults:
    _controller: '\Drupal\world_signature\Controller\WorldController::card'
  requirements:
    _access: 'TRUE'
    entity_type: '[a-z_]+'
    id: '[0-9]+'
    view_mode: '[a-z_]+'

# Phase 3 v1: admin re-embed trigger. POST endpoint the in-canvas
# Stage editor's "Re-embed corpus" button calls. Role-gated by the
# `edit world signature` permission (see world_signature.permissions.yml).
# Embedding *compute* still happens externally per BOUNDARY.md; this
# endpoint just orchestrates via EmbedRunner.
world_signature.admin_embed:
  path: '/world/admin/embed'
  defaults:
    _controller: '\Drupal\world_signature\Controller\WorldController::embedAction'
    _format: json
  methods: [POST]
  requirements:
    _permission: 'edit world signature'
  options:
    no_cache: 'TRUE'

# Phase 3 v2: in-canvas world-config patcher. The Stage editor's
# "World defaults" section calls this with a JSON body whose keys
# are a subset of WorldConfigEditor::ALLOWED_KEYS (today:
# active_atmosphere). Same `edit world signature` permission as
# the v1 embed trigger. Snapshot cache busts automatically via
# the snapshot's `config:world_signature.palette` cache tag.
world_signature.admin_edit_config:
  path: '/world/edit/config'
  defaults:
    _controller: '\Drupal\world_signature\Controller\WorldController::editConfigAction'
    _format: json
  methods: [PATCH, POST]
  requirements:
    _permission: 'edit world signature'
  options:
    no_cache: 'TRUE'

# Phase 3 v3: interpretation-rules patcher. Stage editor's
# "Interpretation" section calls this with a structured JSON body
# (atmosphere + axisPatches). Same `edit world signature` permission
# as the v1 embed trigger and v2 config patcher. Snapshot cache
# busts automatically via the `config:world_signature.interpretation`
# cache tag.
world_signature.admin_edit_interpretation:
  path: '/world/edit/interpretation'
  defaults:
    _controller: '\Drupal\world_signature\Controller\WorldController::editInterpretationAction'
    _format: json
  methods: [PATCH, POST]
  requirements:
    _permission: 'edit world signature'
  options:
    no_cache: 'TRUE'

# v0.1.1: /sector/{termId} is a world-coordinate URL. The controller
# returns an empty render array — the theme's page.html.twig provides
# the canvas, the bundle boots, and CameraController reads the URL
# to derive the right Vantage. Page title is human-friendly for
# crawlers and browser tabs.
world_signature.sector:
  path: '/sector/{termId}'
  defaults:
    _controller: '\Drupal\world_signature\Controller\WorldController::sector'
    _title_callback: '\Drupal\world_signature\Controller\WorldController::sectorTitle'
  requirements:
    _access: 'TRUE'
    termId: '[0-9]+'
