# Renderer bundle — the three.js world. Shipped by the module
# rather than the theme so sites can run the renderer without
# installing drupal_threejs. `version:` is auto-stamped by
# world_signature_library_info_alter (in world_signature.module)
# to a 12-char md5 of the bundle; the string below is the fallback
# used when the file is missing (fresh install pre-build).
world:
  version: 1.0.x
  js:
    js/world.bundle.js:
      minified: true
      attributes:
        type: module
        defer: true
  dependencies:
    - core/drupal

# Asset teaser hover-autoplay. Attached on node/asset/teaser renders
# by world_signature_preprocess_node().
asset_hover:
  version: 1.0.x
  js:
    js/asset-hover.js: {}
  css:
    component:
      css/asset-hover.css: {}
  dependencies:
    - core/drupal
    - core/once
