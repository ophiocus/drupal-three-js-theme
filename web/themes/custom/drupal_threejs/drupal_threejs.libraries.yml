# Theme's world library: page-shell CSS only.
#
# The renderer bundle itself lives in the world_signature module
# (contrib shape — the module is the standalone deliverable, the
# theme is optional). Sites without drupal_threejs can attach
# world_signature/world directly via a block plugin or a custom
# page template.
world:
  version: 1.0.x
  css:
    base:
      css/world.css: {}
  dependencies:
    - world_signature/world
    - core/drupal
