# `version:` is auto-stamped by drupal_threejs_library_info_alter
# in drupal_threejs.theme — it computes md5 of dist/world.bundle.js
# and appends a 12-char hash, so `?v=0.2.x.<hash>` changes exactly
# when the bundle content does. The string below is the fallback
# used if the bundle is missing (fresh install pre-build).
world:
  version: 0.2.1
  js:
    dist/world.bundle.js:
      minified: true
      attributes:
        type: module
        defer: true
  css:
    base:
      css/world.css: {}
  dependencies:
    - core/drupal
